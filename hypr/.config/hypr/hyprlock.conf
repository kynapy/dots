background {
    monitor             = 
    color               = rgba(25, 20, 20, 1.0)

    blur_passes         = 2
    blur_size           = 7
    noise               = 0.0117
    contrast            = 0.8916
    brightness          = 0.8172
    vibrancy            = 0.1696
    vibrancy_darkness   = 0.2
}

input-field {
    monitor             = HDMI-A-2
    size                = 200, 30
    outline_thickness   = 2
    inner_color         = rgba(0, 0, 0, 0.2)
    outer_color         = rgba(0, 0, 0, 0)
    check_color         = rgba(204, 136, 34)
    fail_color          = rgba(ff6633ee)
    font_family         = JetBrains Mono Nerd Font
    font_color          = rgb(143, 143, 143)
    fade_on_empty       = false
    rounding            = -1
    position            = 0, -20
    halign              = center
    valign              = center
    dots_center         = true
    placeholder_text    = <span>password</span>
}

# GREETING
label {
    monitor         = HDMI-A-2
    text            = Hey there, $USER!
    color           = rgba(242, 243, 244, 0.75)
    font_size       = 9
    font_family     = JetBrains Mono Nerd Font
    position        = 0, 15
    halign          = center
    valign          = center
}

# DATE
label {
    monitor         = HDMI-A-2
    text            = cmd[update:1000] date +"%A, %B %d"
    color           = rgba(242, 243, 244, 0.75)
    font_size       = 25
    font_family     = JetBrains Mono Nerd Font
    font_weight     = bold
    position        = 0, 160
    halign          = center
    valign          = center
}

# TIME
label {
    monitor         = HDMI-A-2
    text            = cmd[update:1000] date +"%-I:%M%p"
    color           = rgba(242, 243, 244, 0.75)
    font_size       = 25
    font_family     = JetBrains Mono Nerd Font
    position        = 0, 110
    halign          = center
    valign          = center
}
